<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <title>Product</title>
</head>
<body>
  
  <main>
    <div class="container my-5">
      <a href="/product.html" class="btn btn-secondary mb-4">← Back to Products</a>
      
      <div id="detail-container" class="row justify-content-center">
        <div class="col-md-6 text-center">Loading details...</div>
      </div>
        
        

    </div>
        
  </main>
        <div class="qrpopup">
          <img  src="./image/qr.jpg" alt="QR">
        </div>

  <script>
    async function renderSingleProduct() {
      const detailContainer = document.querySelector('#detail-container');

      try {
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (!productId) {
          detailContainer.innerHTML = `<div class="alert alert-danger">No product ID specified.</div>`;
          return;
        }

        const response = await fetch('data.json');
        if (!response.ok) throw new Error('Failed to fetch data');
        const data = await response.json();

        const targetProduct = data.find(item => String(item.id) === productId);

        if (!targetProduct) {
          detailContainer.innerHTML = `<div class="alert alert-danger">Product not found.</div>`;
          return;
        }

        detailContainer.innerHTML = `
          <div class="col-md-6">
            <img src="${targetProduct.image}" class="img-fluid rounded shadow" alt="${targetProduct.title}">
          </div>
          <div class="col-md-6">
            <h1 class="display-5 fw-bold">${targetProduct.title}</h1>
            <p class="fs-4 text-muted">${targetProduct.product}</p>
            <hr>
            <a type="button" id="qr" button class="btn btn-primary btn-lg px-4">Buy Now</button><a>
          </div>
        `;
        document.getElementById("qr").addEventListener("click", function(){
        const qr = document.querySelector(".qrpopup");qr.style.display = "flex";
        setTimeout(function(){
        qr.style.display = "none";
      }, 2000);
      })

      } catch (error) {
        console.error('Error:', error);
        detailContainer.innerHTML = `<div class="alert alert-danger">Error loading data.</div>`;
      }
    }
    

    renderSingleProduct();
  </script>
  <script>
    
  </script>
</body>
</html>
