<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product</title>
    <link rel="stylesheet" href="./style.css" />
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
        crossorigin="anonymous"
    />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"
    />
</head>
<body>
    <header
        id="header"
        class="bg-primary position-sticky top-0 w-100"
    ></header>

    <main style="min-height: calc(100vh - 0px); margin-bottom: 100px;">
        <section class="container">
            <div class="row row-cols-3  g-3" id="prod-container"></div>
        </section>
    </main>

    <footer class="bg-primary p-2"></footer>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"
></script>
<script>
    const prodContainer = document.querySelector("#prod-container");

    async function Render() {
        try {
            const response = await fetch("data.json");
                if (!response.ok) throw new Error("Failed to fetch");

                    const data = await response.json();

                        data.forEach((item) => {
                            prodContainer.innerHTML += `
    <a href="show.html?id=${item.id}" class="text-decoration-none text-dark">
    <div class="col">
        <div class="card overflow-hidden">
            <img style="height: 300px; object-fit: cover; " src="${item.image}" alt="image"/>
            <div class="card-body">
                <h2>${item.title}</h2>
                <p>${item.product}</p>
            </div>
        </div>
    </div>
</a>
`;
});
        } catch (error) {
            console.error("Error:", error);
        }
}

    Render();
</script>

<script type="module">
    import { headComponent, footComponent } from "./components.js";
    document.querySelector("#header").innerHTML = headComponent();
    document.querySelector("footer").innerHTML = footComponent();
</script>
</body>
</html>
